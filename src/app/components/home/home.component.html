<div class="page-wrapper">

  <!-- ── Two Column Body ── -->
  <div class="page-body">

    <!-- LEFT: Text boxes -->
    <app-text-display
      [outputText]="outputText"
      [isBold]="isBold"
      [isItalic]="isItalic"
      [isUnderline]="isUnderline"
      [textColor]="textColor"
      [fontSize]="fontSize"
      (inputChanged)="onInputChange($event)">
    </app-text-display>

    <!-- RIGHT: Stats + Buttons -->
    <app-formatters
      [textColor]="textColor"
      (clearAll)="onClearAll()"
      (removeExtraSpaces)="onRemoveExtraSpaces()"
      (reverseSentence)="onReverseSentence()"
      (removeSpecialChars)="onRemoveSpecialChars()"
      (capitalizeWords)="onCapitalizeWords()"
      (toggleBold)="onToggleBold()"
      (toggleItalic)="onToggleItalic()"
      (toggleUnderline)="onToggleUnderline()"
      (colorChange)="onColorChange($event)"
      (removeStyling)="onRemoveStyling()"
      (increaseFontSize)="onIncreaseFontSize()"
      (decreaseFontSize)="onDecreaseFontSize()">
    </app-formatters>

  </div>
</div>

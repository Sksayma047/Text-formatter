<div class="left-panel">

  <!-- INPUT AREA -->
  <div class="text-block">
    <div class="block-label">Type Text :-</div>
    <textarea
      class="text-area"
      [ngModel]="localInput"
      (ngModelChange)="onType($event)"
      rows="6"
      spellcheck="true"
      aria-label="Text input">
    </textarea>
  </div>

  <!-- OUTPUT AREA -->
  <div class="text-block">
    <div class="block-label">Ouput Text :-</div>
    <div
      class="output-area"
      [ngStyle]="previewStyle"
      aria-label="Formatted output"
      aria-live="polite">
      <ng-container *ngIf="outputText; else empty">{{ outputText }}</ng-container>
      <ng-template #empty><span></span></ng-template>
  </div>
  </div>

</div>

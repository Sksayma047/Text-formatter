<div class="api-page">

  <div class="api-body">

    <!-- ══════════════════════════════
         LEFT PANEL
    ══════════════════════════════ -->
    <div class="left-col">

      <!-- User Id row -->
      <div class="userid-row">
        <label class="field-label">User Id :-</label>
        <input
          class="userid-input"
          type="number"
          min="1"
          [(ngModel)]="userId"
          (ngModelChange)="validationMsg = ''; errorMsg = ''"
          placeholder=""
        />
      </div>

      <!-- Validation msg -->
      <div class="val-msg" *ngIf="validationMsg">{{ validationMsg }}</div>

      <!-- Resource buttons: Comments, Albums, Photos, Todos -->
      <div class="resource-list">
        <button
          *ngFor="let r of resources"
          class="resource-btn"
          [class.resource-active]="selectedResource === r"
          (click)="selectedResource = r">
          {{ r | titlecase }}
        </button>
      </div>

      <!-- Action buttons: Delete + Update -->
      <div class="action-row">
        <button class="action-btn dark-btn" (click)="onDelete()" [disabled]="isLoading">Delete</button>
        <button class="action-btn dark-btn" (click)="onUpdate()" [disabled]="isLoading">Update</button>
      </div>

      <!-- Create button -->
      <div class="action-row">
        <button class="action-btn dark-btn" (click)="onCreate()" [disabled]="isLoading">Create</button>
      </div>

      <!-- Input Body row -->
      <div class="body-row">
        <label class="field-label">Input Body :-</label>
        <input
          class="body-input"
          type="text"
          [(ngModel)]="inputBody"
          placeholder=""
        />
      </div>

    </div><!-- /left-col -->

    <!-- ══════════════════════════════
         RIGHT PANEL
    ══════════════════════════════ -->
    <div class="right-col">

      <!-- Error Msg box -->
      <div class="error-box">
        <div class="box-title">Error Msg</div>
        <div class="error-content" *ngIf="errorMsg || validationMsg">
          {{ errorMsg || validationMsg }}
        </div>
      </div>

      <!-- Response Data box -->
      <div class="response-box">
        <div class="box-title">Response Data</div>

        <!-- Loading -->
        <div class="loading-row" *ngIf="isLoading">
          <div class="spin"></div> Loading…
        </div>

        <!-- Photo resource: show image -->
        <ng-container *ngIf="responseData && !isLoading && isPhotoResource && isListResponse">
          <div class="photo-grid">
            <div class="photo-item" *ngFor="let item of responseList | slice:0:4">
              <img [src]="item.thumbnailUrl" [alt]="item.title"
                class="thumb"
                (error)="$any($event.target).style.display='none'" />
              <span class="photo-title">{{ item.title | slice:0:30 }}…</span>
            </div>
          </div>
        </ng-container>

        <!-- List response -->
        <ng-container *ngIf="responseData && !isLoading && isListResponse && !isPhotoResource">
          <div class="resp-count">{{ responseList.length }} records</div>
          <div class="resp-scroll">
            <div class="resp-row" *ngFor="let item of responseList; let i = index"
              [class.resp-alt]="i % 2 === 0">
              <ng-container *ngFor="let kv of getEntries(item)">
                <span class="resp-key">{{ kv.key }}:</span>
                <span class="resp-val">
                  <ng-container *ngIf="isObject(kv.value); else plain"><span class="obj-tag">Object</span></ng-container>
                  <ng-template #plain>{{ kv.value }}</ng-template>
                </span>
              </ng-container>
            </div>
          </div>
        </ng-container>

        <!-- Single object -->
        <ng-container *ngIf="responseData && !isLoading && !isListResponse">
          <div class="resp-scroll">
            <div class="resp-row" *ngFor="let kv of flatResponse; let i = index"
              [class.resp-alt]="i % 2 === 0">
              <span class="resp-key">{{ kv.key }}</span>
              <span class="resp-sep">:</span>
              <span class="resp-val">
                <ng-container *ngIf="isObject(kv.value); else sv">
                  <pre class="nested">{{ kv.value | json }}</pre>
                </ng-container>
                <ng-template #sv>{{ kv.value }}</ng-template>
              </span>
            </div>
          </div>
        </ng-container>

        <!-- Empty -->
        <div class="empty-hint" *ngIf="!responseData && !isLoading">
          Select a resource and click Fetch to see data
        </div>

      </div><!-- /response-box -->

    </div><!-- /right-col -->

  </div><!-- /api-body -->
</div>
